<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De'licia - Produtos Artesanais</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="header">
        <div class="logo-container"><img src="{{ url_for('static', filename='img/Logotipo-v2.png') }}" alt="De'licia Logo" class="logo"></div>
    </header>

    <main class="main-content">
        <section class="catalog">
            <h2 class="section-title">Catálogo de Produtos</h2>
            <div class="products-grid" id="productsGrid">
                {% for product_id, product in products.items() %}
                <div class="product-card" data-product-id="{{ product_id }}" data-product-name="{{ product.name }}" data-product-price="{{ product.price }}">
                    <img src="{{ url_for('static', filename='img/' + product.image_file) }}" alt="{{ product.name }}" class="product-image">
                    <h3 class="product-name">{{ product.name }}</h3>
                    <p class="product-price">A partir de R$ {{ "%.2f"|format(product.price) }}</p>
                    <button type="button" class="btn-customize" data-product-id="{{ product_id }}">Adicionar / Customizar</button>
                    <script type="application/json" class="product-data">
                        {
                            "id": "{{ product_id }}",
                            "name": "{{ product.name }}",
                            "price": {{ product.price }},
                            "coverings": [{% for c in product.coverings %}{"name":"{{ c.name }}","additional_price":{{ c.additional_price }}}{% if not loop.last %},{% endif %}{% endfor %}],
                            "flavors": [{% for f in product.flavors %}{"name":"{{ f.name }}","additional_price":{{ f.additional_price }}}{% if not loop.last %},{% endif %}{% endfor %}]
                        }
                    </script>
                </div>
                {% endfor %}
            </div>
        </section>

        <div id="cartBar" class="cart-bar">
            <div class="cart-summary">
                <span id="cartCount">0</span> itens • <strong id="cartTotal">R$ 0,00</strong>
            </div>
            <button id="openCartBtn" class="cart-btn">Ver Carrinho</button>
        </div>

        <aside id="cartDrawer" class="cart-drawer">
            <button id="closeCartBtn" class="drawer-close">×</button>
            <h3>Carrinho</h3>
            <div id="cartItemsList" class="cart-items-list"></div>

            <div class="checkout-form">
                <label>Nome<span>*</span>:</label>
                <input type="text" id="drawer_buyer_name" placeholder="Seu nome">

                <label>Telefone<span>*</span>:</label>
                <input type="text" id="drawer_buyer_phone" placeholder="(00) 00000-0000">

                <label>E-mail<span>*</span>:</label>
                <input type="email" id="drawer_buyer_email" class="text-input" placeholder="seu@email.com">

                <label>Forma de Entrega<span>*</span>:</label>
                <select id="drawer_delivery_method">
                    <option value="Retirada" selected>Retirada no Local (Grátis)</option>
                    <option value="Entrega">Entrega em Curitiba (+R$ 5,00)</option>
                </select>

                <label id="drawer-address-label" style="display:none;">Endereço de Entrega<span>*</span>:</label>
                <input type="text" id="drawer_delivery_address" placeholder="Rua, número, bairro" style="display:none;">

                <p class="delivery-fee">Taxa de Entrega: <strong id="deliveryFee">R$ 0,00</strong></p>
                <p class="cart-total">Total: <strong id="drawerTotal">R$ 0,00</strong></p>

                <button type="button" id="checkoutBtn" class="submit-btn">Finalizar Pedido</button>
            </div>
        </aside>

        <form id="submitOrderForm" action="{{ url_for('pagamento') }}" method="post" style="display:none;">
            <input type="hidden" name="buyer_name" id="hidden_buyer_name">
            <input type="hidden" name="buyer_phone" id="hidden_buyer_phone">
            <input type="hidden" name="buyer_email" id="hidden_buyer_email">
            <input type="hidden" name="delivery_method" id="hidden_delivery_method">
            <input type="hidden" name="delivery_address" id="hidden_delivery_address">
            <input type="hidden" name="cart_items" id="hidden_cart_items">
        </form>

    </main>

    <footer class="footer">
        <p>&copy; 2023 De'licia. Todos os direitos reservados.</p>
    </footer>

    <div id="customizeModal" class="modal-overlay" style="display:none;">
        <div class="customize-modal">
            <button id="closeCustomizeBtn" class="modal-close">×</button>
            <h2 id="modalProductName"></h2>
            <p class="modal-price" id="modalProductPrice"></p>

            <div id="modalCoverings" class="selection-section"></div>
            <div id="modalFlavors" class="selection-section"></div>

            <button type="button" id="addToCartBtn" class="submit-btn">Adicionar ao Carrinho</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De'licia - Produtos Artesanais</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="header">
        <div class="logo-container">
            <img src="{{ url_for('static', filename='img/Logo_delicia.jpg') }}" alt="De'licia Logo" class="logo">
        </div>
        <h1 class="store-name">De'licia</h1>
    </header>

    <main class="main-content">
        <section class="catalog">
            <h2 class="section-title">Catálogo de Produtos</h2>
            <form id="orderForm" action="{{ url_for('pagamento') }}" method="post" class="order-form">
                <div class="buyer-info">
                    <label for="buyer_name">Nome<span style="color:red">*</span>:</label>
                    <input type="text" id="buyer_name" name="buyer_name" class="text-input" required>

                    <label for="buyer_phone">Telefone<span style="color:red">*</span>:</label>
                    <input type="text" id="buyer_phone" name="buyer_phone" class="text-input" required maxlength="15" placeholder="(00) 00000-0000">
                </div>
                <div class="products-grid">
                    {% for product_id, product in products.items() %}
                    <div class="product-card">
                        <h3 class="product-name">{{ product.name }}</h3>
                        <p class="product-price">R$ {{ "%.2f"|format(product.price) }}</p>
                        {% for flavor in product.flavors %}
                        <div class="flavor-selection">
                            <label for="{{ product_id }}_{{ flavor.name }}_qty" class="qty-label">{{ flavor.name }}{% if flavor.additional_price > 0 %} (+R$ {{ "%.2f"|format(flavor.additional_price) }}){% endif %}:</label>
                            <input type="number" id="{{ product_id }}_{{ flavor.name }}_qty" name="{{ product_id }}_{{ flavor.name }}_qty" min="0" value="0" class="qty-input">
                        </div>
                        {% endfor %}
                        <div class="card-spacer"></div>
                    </div>
                    {% endfor %}
                </div>
                <br>
                <button id="reviewBtn" type="button" class="submit-btn">Fazer Pedido</button>
            </form>

            <!-- Modal de revisão -->
            <div id="modalOverlay" class="modal-overlay">
                <div class="review-modal">
                    <img src="{{ url_for('static', filename='img/Logo_delicia.jpg') }}" alt="Logo" style="display:block;margin:0 auto;max-width:120px;">
                    <h2>Revisar Pedido</h2>
                    <div class="summary" id="orderSummary">
                        <!-- conteúdo preenchido via JS -->
                    </div>
                    <div class="btn-group">
                        <button type="button" class="btn-back" id="backBtn">Voltar</button>
                        <button type="button" class="btn-confirm" id="confirmBtn">Confirmar</button>
                    </div>
                </div>
            </div>

            <script src="{{ url_for('static', filename='js/main.js') }}"></script>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2023 De'licia. Todos os direitos reservados.</p>
    </footer>
</body>
</html>

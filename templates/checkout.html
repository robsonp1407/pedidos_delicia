<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De'licia - Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="header">
        <div class="logo-container">
            <img src="{{ url_for('static', filename='img/logo_delicia.png') }}" alt="De'licia Logo" class="logo">
        </div>
        <h1 class="store-name">De'licia</h1>
    </header>

    <main class="main-content">
        <section class="checkout">
            <h2 class="section-title">Checkout</h2>
            <div class="total-display">
                <p class="total-text">Valor Total: R$ {{ "%.2f"|format(subtotal) }}</p>
            </div>
            <div class="pix-section">
                <h3 class="pix-title">Pagamento via Pix</h3>
                <p class="pix-instruction">Copie o código abaixo e cole no seu aplicativo de banco para efetuar o pagamento:</p>
                <textarea class="pix-code" readonly>{{ pix_code }}</textarea>
                <button class="copy-btn" onclick="navigator.clipboard.writeText('{{ pix_code }}')">Copiar Código</button>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2023 De'licia. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
